<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reservas Danza Aérea</title>

  <!-- Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f3f3f3;
      display: flex;
      justify-content: center;
      padding: 30px;
      margin: 0;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 520px;
    }
    h2 { text-align: center; margin-top: 0; }
    label { font-weight: bold; display: block; margin-top: 14px; }
    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 15px;
    }
    button[type="submit"] {
      background-color: #ffa726;
      color: white;
      border: none;
      font-weight: bold;
      margin-top: 18px;
      cursor: pointer;
    }
    button[disabled] {
      opacity: .6;
      cursor: not-allowed;
    }
    #diaTexto {
      display:block;
      margin-top: 6px;
      color:#666;
      font-size: 13px;
    }
    #mensaje {
      display: none;
      padding: 12px;
      margin-top: 18px;
      border-radius: 10px;
      font-weight: bold;
      text-align: center;
    }
    #mensaje.ok { background: #e0f2f1; color: #00695c; }
    #mensaje.err { background: #ffebee; color: #b71c1c; }

    .spinner {
      display: none;
      margin-left: 8px;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,.6);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      vertical-align: middle;
    }
    button.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px){
      body { padding: 16px; }
      .container { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Reservas Danza Aérea</h2>

    <form id="formulario">
      <label for="fecha">Selecciona una fecha:</label>
      <input id="fecha" name="fecha" type="text" placeholder="Elige un día en el calendario" readonly required>
      <small id="diaTexto"></small>

      <input type="hidden" id="dia" name="dia" />

      <label for="elemento">Elemento:</label>
      <select id="elemento" name="elemento" required>
        <option value="">Selecciona un elemento</option>
        <option value="Telas">Telas</option>
        <option value="Lira">Lira</option>
      </select>

      <label for="horario">Horario:</label>
      <select id="horario" name="horario" required>
        <option value="">Selecciona una fecha y un elemento</option>
      </select>

      <label for="nombre">Nombre Completo:</label>
      <input id="nombre" name="nombre" type="text" required>

      <label for="correo">Correo electrónico:</label>
      <input id="correo" name="correo" type="email" required>

      <label for="celular">Celular:</label>
      <input id="celular" name="celular" type="text" required>

      <button id="btnSubmit" type="submit">
        Reservar <span class="spinner"></span>
      </button>
    </form>

    <div id="mensaje"></div>
  </div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbzmw0NIXFbuaoGNZkIW_c7ypGVvTrU8WB7auWqMHtx5wrABCjNPFL7VxdtidhfhWLvW/exec";

  let disponibilidadDias = {};
  let fechasBloqueadas = [];
  let fechaSeleccionada = "";
  let diaSeleccionado = "";
  let isSubmitting = false;

  function mostrarMensaje(msg, ok) {
    const div = document.getElementById("mensaje");
    div.textContent = msg;
    div.className = ok ? "ok" : "err";
    div.style.display = "block";
  }

  function limpiarMensaje() {
    const div = document.getElementById("mensaje");
    div.style.display = "none";
    div.textContent = "";
    div.className = "";
  }

  function cbDias(payload) {
    if (!payload || payload.error) {
      mostrarMensaje(payload?.error || "Error cargando disponibilidad.", false);
      return;
    }

    disponibilidadDias = payload.disponibilidad || {};
    fechasBloqueadas = payload.fechasBloqueadas || [];
    initCalendar();
  }

  function cbHorarios(payload) {
    const sel = document.getElementById("horario");
    sel.innerHTML = "";

    if (!payload || payload.error) {
      sel.innerHTML = `<option value="">No se pudo cargar horarios</option>`;
      return;
    }

    const horarios = payload.horarios || [];
    if (!horarios.length) {
      sel.innerHTML = `<option value="">No hay horarios disponibles</option>`;
      return;
    }

    sel.innerHTML = `<option value="">Selecciona un horario</option>`;
    horarios.forEach(h => {
      const opt = document.createElement("option");
      opt.value = h;
      opt.textContent = h;
      sel.appendChild(opt);
    });
  }

  function jsonp(url) {
    const s = document.createElement("script");
    s.src = url + (url.includes("?") ? "&" : "?") + "_=" + Date.now();
    s.onerror = () => mostrarMensaje("Error de red cargando datos.", false);
    document.body.appendChild(s);
  }

  function cargarDiasDisponibles() {
    jsonp(`${API}?action=obtenerDisponibilidad&callback=cbDias`);
  }

  function initCalendar() {
    const diasDisponibles = new Set(Object.keys(disponibilidadDias));

    const mapDayNameToIndex = {
      "Domingo": 0,
      "Lunes": 1,
      "Martes": 2,
      "Miércoles": 3,
      "Miercoles": 3,
      "Jueves": 4,
      "Viernes": 5,
      "Sábado": 6,
      "Sabado": 6
    };

    const allowedIndexes = new Set(
      Array.from(diasDisponibles)
        .map(d => mapDayNameToIndex[d])
        .filter(v => v !== undefined)
    );

    const input = document.getElementById("fecha");
    if (input._flatpickr) input._flatpickr.destroy();

    flatpickr("#fecha", {
      dateFormat: "Y-m-d",
      minDate: "today",
      maxDate: new Date().fp_incr(120),
      disableMobile: true,
      enable: [
        function(date) {
          const yyyy = date.getFullYear();
          const mm = String(date.getMonth() + 1).padStart(2, "0");
          const dd = String(date.getDate()).padStart(2, "0");
          const fechaStr = `${yyyy}-${mm}-${dd}`;

          if (fechasBloqueadas.includes(fechaStr)) return false;
          return allowedIndexes.has(date.getDay());
        }
      ],
      onChange: (selectedDates, dateStr) => {
        limpiarMensaje();
        fechaSeleccionada = dateStr;
        diaSeleccionado = obtenerNombreDia(dateStr);

        document.getElementById("diaTexto").textContent = `Día: ${diaSeleccionado}`;
        document.getElementById("dia").value = diaSeleccionado;

        cargarHorariosSiListo();
      }
    });

    resetHorarios();
  }

  function resetHorarios() {
    document.getElementById("horario").innerHTML = `<option value="">Selecciona una fecha y un elemento</option>`;
    document.getElementById("diaTexto").textContent = "";
    document.getElementById("dia").value = "";
    fechaSeleccionada = "";
    diaSeleccionado = "";
  }

  function obtenerNombreDia(yyyy_mm_dd) {
    const [y,m,d] = yyyy_mm_dd.split("-").map(Number);
    const dt = new Date(y, m-1, d, 12, 0, 0);
    const dias = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    return dias[dt.getDay()];
  }

  function cargarHorariosSiListo() {
    const elemento = document.getElementById("elemento").value;
    const sel = document.getElementById("horario");

    if (!fechaSeleccionada || !elemento) {
      sel.innerHTML = `<option value="">Selecciona una fecha y un elemento</option>`;
      return;
    }

    sel.innerHTML = `<option value="">Cargando horarios...</option>`;
    const url = `${API}?action=obtenerHorarios&fecha=${encodeURIComponent(fechaSeleccionada)}&elemento=${encodeURIComponent(elemento)}&callback=cbHorarios`;
    jsonp(url);
  }

  document.getElementById("elemento").addEventListener("change", () => {
    limpiarMensaje();
    cargarHorariosSiListo();
  });

  document.getElementById("formulario").addEventListener("submit", async (e) => {
    e.preventDefault();
    limpiarMensaje();

    if (isSubmitting) return;
    if (!fechaSeleccionada) return mostrarMensaje("Selecciona una fecha en el calendario.", false);
    if (!document.getElementById("elemento").value) return mostrarMensaje("Selecciona un elemento.", false);

    isSubmitting = true;
    const btn = document.getElementById("btnSubmit");
    btn.disabled = true;
    btn.classList.add("loading");

    const form = new FormData(e.target);
    const body = new URLSearchParams(form).toString();

    try {
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body
      });

      const text = await res.text();
      mostrarMensaje(text, text.includes("✅"));

      if (text.includes("✅")) {
        e.target.reset();
        resetHorarios();
        cargarDiasDisponibles();
      }
    } catch {
      mostrarMensaje("❌ Error al enviar la reserva.", false);
    } finally {
      isSubmitting = false;
      btn.disabled = false;
      btn.classList.remove("loading");
    }
  });

  cargarDiasDisponibles();
</script>
</body>
</html>
