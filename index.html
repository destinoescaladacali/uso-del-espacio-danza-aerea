<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reservas Danza Aérea</title>

  <!-- Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f3f3f3;
      display: flex;
      justify-content: center;
      padding: 30px;
      margin: 0;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 520px;
    }
    h2 { text-align: center; margin-top: 0; }
    label { font-weight: bold; display: block; margin-top: 14px; }
    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 15px;
    }
    button[type="submit"] {
      background-color: #ffa726;
      color: white;
      border: none;
      font-weight: bold;
      margin-top: 18px;
      cursor: pointer;
    }

    #diaTexto {
      display:block;
      margin-top: 6px;
      color:#666;
      font-size: 13px;
    }

    #mensaje {
      display: none;
      padding: 12px;
      margin-top: 18px;
      border-radius: 10px;
      font-weight: bold;
      text-align: center;
    }
    #mensaje.ok { background: #e0f2f1; color: #00695c; }
    #mensaje.err { background: #ffebee; color: #b71c1c; }

    @media (max-width: 480px){
      body { padding: 16px; }
      .container { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Reservas Danza Aérea</h2>

    <form id="formulario">
      <label for="fecha">Selecciona una fecha:</label>
      <input id="fecha" name="fecha" type="text" placeholder="Elige un día en el calendario" readonly required>
      <small id="diaTexto"></small>

      <!-- Se envía también el día (calculado) -->
      <input type="hidden" id="dia" name="dia" />

      <label for="horario">Horario:</label>
      <select id="horario" name="horario" required>
        <option value="">Selecciona una fecha primero</option>
      </select>

      <label for="elemento">Elemento:</label>
      <select id="elemento" name="elemento" required>
        <option value="">Selecciona un elemento</option>
        <option value="Telas">Telas</option>
        <option value="Lira">Lira</option>
      </select>

      <label for="nombre">Nombre Completo:</label>
      <input id="nombre" name="nombre" type="text" required>

      <label for="correo">Correo electrónico:</label>
      <input id="correo" name="correo" type="email" required>

      <label for="celular">Celular:</label>
      <input id="celular" name="celular" type="text" required>

      <button type="submit">Reservar</button>
    </form>

    <div id="mensaje"></div>
  </div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbzmw0NIXFbuaoGNZkIW_c7ypGVvTrU8WB7auWqMHtx5wrABCjNPFL7VxdtidhfhWLvW/exec";

  let disponibilidad = {}; // { "Lunes": ["..."], ... }
  let fechaSeleccionada = "";
  let diaSeleccionado = "";

  function mostrarDias(data) {
    if (!data || typeof data !== "object") {
      mostrarMensaje("Error cargando disponibilidad.", false);
      return;
    }
    disponibilidad = data;
    initCalendar();
  }

  function cargarDisponibilidad() {
    const s = document.createElement("script");
    s.src = `${API}?action=obtenerDisponibilidad&callback=mostrarDias`;
    document.body.appendChild(s);
  }

  function initCalendar() {
    const diasDisponibles = new Set(Object.keys(disponibilidad)); // "Lunes", ...

    const mapDayNameToIndex = {
      "Domingo": 0, "Lunes": 1, "Martes": 2, "Miércoles": 3, "Miercoles": 3,
      "Jueves": 4, "Viernes": 5, "Sábado": 6, "Sabado": 6
    };

    const allowedIndexes = new Set(
      Array.from(diasDisponibles)
        .map(d => mapDayNameToIndex[d])
        .filter(v => v !== undefined)
    );

    const input = document.getElementById("fecha");
    if (input._flatpickr) input._flatpickr.destroy();

    flatpickr("#fecha", {
      dateFormat: "Y-m-d",
      minDate: "today",
      maxDate: new Date().fp_incr(120), // ajusta (días hacia el futuro)
      enable: [
        function(date) {
          return allowedIndexes.has(date.getDay());
        }
      ],
      onChange: function(selectedDates, dateStr) {
        fechaSeleccionada = dateStr;
        diaSeleccionado = obtenerNombreDia(dateStr);

        document.getElementById("diaTexto").textContent = `Día: ${diaSeleccionado}`;
        document.getElementById("dia").value = diaSeleccionado;

        cargarHorariosParaDia(diaSeleccionado);
      }
    });

    resetHorarios();
  }

  function resetHorarios(){
    const sel = document.getElementById("horario");
    sel.innerHTML = `<option value="">Selecciona una fecha primero</option>`;
    document.getElementById("diaTexto").textContent = "";
    document.getElementById("dia").value = "";
    fechaSeleccionada = "";
    diaSeleccionado = "";
  }

  function obtenerNombreDia(yyyy_mm_dd) {
    const [y,m,d] = yyyy_mm_dd.split("-").map(Number);
    const dt = new Date(y, m-1, d, 12, 0, 0);
    const dias = ["Domingo","Lunes","Martes","Miércoles","Jueves","Vi]()
